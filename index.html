    <!-- On-screen error reporter to debug white screen -->
    <script>
      // Global Emergency Shield v3.0 - Silencing AbortErrors and Benign Noise
      const silenceBenign = (event) => {
        const error = event.error || event.reason || event;
        const msg = String(error?.message || error?.code || error || "").toLowerCase();
        
        const isBenign = /abort|cancelled|user aborted|timeout|fetching|resizeobserver|script error/i.test(msg);
        
        if (isBenign) {
          if (event.preventDefault) event.preventDefault();
          if (event.stopImmediatePropagation) event.stopImmediatePropagation();
          return true;
        }
      };

      window.addEventListener('error', silenceBenign, true);
      window.addEventListener('unhandledrejection', silenceBenign, true);
      
      // Fallback for older browsers or specific promise implementations
      window.onerror = (m) => /abort|cancelled|user aborted/i.test(String(m));
      window.onunhandledrejection = (e) => /abort|cancelled|user aborted/i.test(String(e.reason));
    </script>
    <!-- Meta Pixel Code -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {

        n.loaded = !0;
        n.version = '2.0';

        t = b.createElement(e);
        t.async = !0;

        s.parentNode.insertBefore(t, s);
      })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
